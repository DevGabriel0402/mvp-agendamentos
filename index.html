  <style>
    #initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #FAFAF8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease;
    }

    .loader-calendar {
      width: 80px;
      height: 80px;
      background: #DDA7A5;
      border-radius: 12px;
      position: relative;
      animation: pulse-calendar 1.5s infinite ease-in-out;
      box-shadow: 0 10px 25px rgba(221, 167, 165, 0.4);
    }

    .loader-calendar::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 15px;
      right: 15px;
      height: 15px;
      background: #C48B89;
      border-radius: 4px;
    }

    @keyframes pulse-calendar {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(0.95);
        opacity: 0.8;
      }
    }

    .loader-text {
      margin-top: 24px;
      font-family: 'Outfit', sans-serif;
      color: #C48B89;
      font-weight: 500;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div id="initial-loader">
    <div class="loader-calendar"></div>
    <div class="loader-text">AGENDANDO...</div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
